<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>DKP Calculator - Kingdom 3138</title>

<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

<style>

body{
font-family:'MedievalSharp',cursive;
background: radial-gradient(circle,#d4f1ff 0%,#89cff0 100%);
text-align:center;
padding:40px;
}

.box{
background:white;
max-width:720px;
margin:auto;
padding:30px;
border-radius:16px;
border:2px solid #cfa93e;
box-shadow:0 0 20px rgba(207,169,62,0.4);
}

h1{
color:#cfa93e;
}

input{
padding:12px;
font-size:18px;
border-radius:8px;
border:1px solid #ccc;
width:200px;
}

button{
padding:12px 20px;
font-size:18px;
border-radius:10px;
border:none;
background:#cfa93e;
color:white;
cursor:pointer;
margin-left:10px;
}

table{
margin-top:30px;
width:100%;
border-collapse:collapse;
}

td,th{
border:1px solid #ddd;
padding:10px;
}

th{
background:#cfa93e;
color:white;
}

#rdkp{
font-weight:bold;
font-size:22px;
}

/* TACHIMETRO */

.gauge{
width:260px;
height:140px;
margin:40px auto 10px auto;
position:relative;
}

.gauge svg{
width:100%;
height:100%;
}

.needle{
transform-origin:130px 120px;
transform:rotate(-90deg);
transition:transform 1.5s ease;
}

.percent-display{
font-size:28px;
font-weight:bold;
margin-top:-10px;
}

.progress-bar{
width:100%;
background:#eee;
border-radius:10px;
overflow:hidden;
height:28px;
margin-top:20px;
}

.progress-fill{
height:100%;
width:0%;
background:green;
transition:width 1.5s ease;
}

</style>

</head>

<body>

<div class="box">

<h1>DKP Calculator</h1>

<p>Inserisci il tuo Player ID</p>

<input id="playerID" placeholder="Player ID">

<button onclick="cerca()">Calcola</button>

<div class="gauge">

<svg viewBox="0 0 260 140">

<path d="M20 120 A110 110 0 0 1 240 120" fill="none" stroke="#ddd" stroke-width="20"/>

<line x1="130" y1="120" x2="130" y2="30" stroke="red" stroke-width="6" class="needle" id="needle"/>

</svg>

</div>

<div class="percent-display" id="percentDisplay">0%</div>

<div class="progress-bar">
<div class="progress-fill" id="progressFill"></div>
</div>

<table id="risultato" style="display:none;">

<tr>
<th>ID</th>
<th>Nome</th>
<th>Morti Totali</th>
<th>KP</th>
<th>Percentuale DKP</th>
</tr>

<tr>
<td id="rid"></td>
<td id="rnome"></td>
<td id="rmorti"></td>
<td id="rkp"></td>
<td id="rdkp"></td>
</tr>

</table>

</div>

<script>

const sheetURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vTpr4XDQMT_znXF3gqTTUfcZssfr6pePtMYFHUBXyx_CNu0yNaVrAXqzOo-hyTEWltMo7H7z3_V4WfS/pub?gid=0&single=true&output=csv";

async function cerca(){

let id=document.getElementById("playerID").value;

let response=await fetch(sheetURL);
let data=await response.text();

let rows=data.split("\n");

for(let i=1;i<rows.length;i++){

let cols=rows[i].split(",");

let pid=cols[0];
let nome=cols[1];
let power=parseInt(cols[2]);
let mortiT4=parseInt(cols[3]);
let mortiT5=parseInt(cols[4]);
let kp=parseInt(cols[5]);

let morti=mortiT4+mortiT5;

if(pid==id){

let mortiReq=0;
let kpReq=0;

if(power>=100000000){
mortiReq=2000000;
kpReq=400000000;
}
else if(power>=90000000){
mortiReq=1500000;
kpReq=350000000;
}
else if(power>=80000000){
mortiReq=1200000;
kpReq=300000000;
}
else if(power>=70000000){
mortiReq=1000000;
kpReq=200000000;
}
else if(power>=60000000){
mortiReq=800000;
kpReq=100000000;
}
else if(power>=50000000){
mortiReq=500000;
kpReq=55000000;
}
else{
mortiReq=300000;
kpReq=25000000;
}

let pm=(morti/mortiReq)*100;
let pk=(kp/kpReq)*100;

let percent=((pm+pk)/2);

let percentRounded=percent.toFixed(2);

let color="";
let barColor="";

if(percent<50){
color="red";
barColor="#e74c3c";
}
else if(percent<80){
color="gold";
barColor="#f1c40f";
}
else if(percent<100){
color="green";
barColor="#2ecc71";
}
else{
color="deepskyblue";
barColor="#00bfff";
}

document.getElementById("rid").innerText=pid;
document.getElementById("rnome").innerText=nome;
document.getElementById("rmorti").innerText=morti.toLocaleString();
document.getElementById("rkp").innerText=kp.toLocaleString();

let dkpCell=document.getElementById("rdkp");
dkpCell.innerText=percentRounded+"%";
dkpCell.style.color=color;

document.getElementById("risultato").style.display="table";

let needle=document.getElementById("needle");
let rotation=(-90)+(Math.min(percent,100)*1.8);
needle.style.transform="rotate("+rotation+"deg)";

let bar=document.getElementById("progressFill");
bar.style.background=barColor;
bar.style.width=Math.min(percent,100)+"%";

let display=document.getElementById("percentDisplay");

let counter=0;
let target=Math.round(percent);

let interval=setInterval(function(){

if(counter>=target){
clearInterval(interval);
}else{
counter++;
display.innerText=counter+"%";
}

},20);

return;

}

}

alert("Player non trovato");

}

</script>

</body>
</html>
