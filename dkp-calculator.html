<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>DKP Calculator - Kingdom 3138</title>

<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

<style>

body{
font-family:'MedievalSharp',cursive;
background: radial-gradient(circle,#d4f1ff 0%,#89cff0 100%);
text-align:center;
padding:40px;
}

.box{
background:white;
max-width:700px;
margin:auto;
padding:30px;
border-radius:16px;
border:2px solid #cfa93e;
box-shadow:0 0 20px rgba(207,169,62,0.4);
}

h1{
color:#cfa93e;
}

input{
padding:12px;
font-size:18px;
border-radius:8px;
border:1px solid #ccc;
width:200px;
}

button{
padding:12px 20px;
font-size:18px;
border-radius:10px;
border:none;
background:#cfa93e;
color:white;
cursor:pointer;
margin-left:10px;
}

table{
margin-top:30px;
width:100%;
border-collapse:collapse;
}

td,th{
border:1px solid #ddd;
padding:10px;
}

th{
background:#cfa93e;
color:white;
}

#rdkp{
font-weight:bold;
font-size:20px;
}

/* GAUGE */

.gauge-box{
margin-top:40px;
position:relative;
width:260px;
margin-left:auto;
margin-right:auto;
}

#gaugeText{
position:absolute;
top:60%;
left:50%;
transform:translate(-50%,-50%);
font-size:28px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="box">

<h1>DKP Calculator</h1>

<p>Inserisci il tuo Player ID</p>

<input id="playerID" placeholder="Player ID">

<button onclick="cerca()">Calcola</button>

<table id="risultato" style="display:none;">

<tr>
<th>ID</th>
<th>Nome</th>
<th>Morti</th>
<th>KP</th>
<th>Percentuale DKP</th>
</tr>

<tr>
<td id="rid"></td>
<td id="rnome"></td>
<td id="rmorti"></td>
<td id="rkp"></td>
<td id="rdkp"></td>
</tr>

</table>

<div class="gauge-box">

<svg width="260" height="160" viewBox="0 0 260 160">

<path d="M20 140 A110 110 0 0 1 240 140"
stroke="#ddd"
stroke-width="20"
fill="none"/>

<path id="gaugeFill"
d="M20 140 A110 110 0 0 1 240 140"
stroke="#cfa93e"
stroke-width="20"
fill="none"
stroke-dasharray="345"
stroke-dashoffset="345"
stroke-linecap="round"/>

</svg>

<div id="gaugeText">0%</div>

</div>

</div>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTpr4XDQMT_znXF3gqTTUfcZssfr6pePtMYFHUBXyx_CNu0yNaVrAXqzOo-hyTEWltMo7H7z3_V4WfS/pub?gid=0&single=true&output=csv";

async function cerca(){

let id = document.getElementById("playerID").value;

let response = await fetch(sheetURL);
let data = await response.text();

let rows = data.split("\n");

for(let i=1;i<rows.length;i++){

let cols = rows[i].split(",");

let pid = cols[0];
let nome = cols[1];
let power = parseInt(cols[2]);
let morti = parseInt(cols[3]);
let kp = parseInt(cols[4]);

if(pid == id){

let mortiReq=0;
let kpReq=0;

if(power >= 100000000){
mortiReq=2000000;
kpReq=400000000;
}
else if(power >= 90000000){
mortiReq=1500000;
kpReq=350000000;
}
else if(power >= 80000000){
mortiReq=1200000;
kpReq=300000000;
}
else if(power >= 70000000){
mortiReq=1000000;
kpReq=200000000;
}
else if(power >= 60000000){
mortiReq=800000;
kpReq=100000000;
}
else if(power >= 50000000){
mortiReq=500000;
kpReq=55000000;
}
else{
mortiReq=300000;
kpReq=25000000;
}

let pm = (morti / mortiReq) * 100;
let pk = (kp / kpReq) * 100;

let percent = ((pm + pk) / 2);

let percentRounded = percent.toFixed(2);

let color = "";

if(percent < 50){
color = "red";
}
else if(percent < 80){
color = "gold";
}
else if(percent < 100){
color = "green";
}
else{
color = "deepskyblue";
}

document.getElementById("rid").innerText = pid;
document.getElementById("rnome").innerText = nome;
document.getElementById("rmorti").innerText = morti.toLocaleString();
document.getElementById("rkp").innerText = kp.toLocaleString();

let dkpCell = document.getElementById("rdkp");
dkpCell.innerText = percentRounded + "%";
dkpCell.style.color = color;

document.getElementById("risultato").style.display="table";

animateGauge(percent,color);

return;

}

}

alert("Player non trovato");

}

function animateGauge(percent,color){

let gauge = document.getElementById("gaugeFill");
let text = document.getElementById("gaugeText");

let max = 345;

let progress = Math.min(percent,200);

let offset = max - (max * progress / 200);

gauge.style.transition = "stroke-dashoffset 1.5s ease";

gauge.style.strokeDashoffset = offset;

gauge.style.stroke = color;

text.style.color = color;

text.innerText = percent.toFixed(1) + "%";

}

</script>

</body>
</html>
