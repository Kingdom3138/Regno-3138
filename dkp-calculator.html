<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>DKP Calculator - Kingdom 3138</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>

body{
margin:0;
padding:40px;

font-family:'Orbitron',sans-serif;

background:#050505;
color:white;

background-image:url("assets/background.jpg");
background-size:cover;
background-position:center;

min-height:100vh;
}

.box{

max-width:850px;

margin:auto;

padding:40px;

background:rgba(10,10,10,.88);

border:1px solid rgba(255,136,0,.3);

border-radius:25px;

backdrop-filter:blur(12px);

box-shadow:0 0 25px rgba(255,136,0,.15);
}

h1{

color:#ff9500;

font-size:42px;

margin-bottom:20px;

text-shadow:0 0 10px rgba(255,149,0,.35);

}

p{
margin-bottom:25px;
opacity:.9;
}

input{

padding:16px;

width:260px;

background:#111;

border:1px solid rgba(255,136,0,.3);

border-radius:14px;

color:white;

font-size:16px;

outline:none;
}

input:focus{

border-color:#ff9500;

box-shadow:0 0 12px rgba(255,149,0,.4);

}

button{

padding:15px 28px;

margin-left:10px;

border:none;

border-radius:14px;

background:#ff9500;

color:white;

font-family:'Orbitron',sans-serif;

font-weight:700;

cursor:pointer;

box-shadow:0 0 10px rgba(255,136,0,.25);

transition:.3s;
}

button:hover{

transform:translateY(-2px);

box-shadow:0 0 20px rgba(255,136,0,.45);

}

table{

margin-top:35px;

width:100%;

border-collapse:collapse;

background:#0b0b0b;

border-radius:15px;

overflow:hidden;
}

td,th{

padding:14px;

border:1px solid rgba(255,136,0,.15);

}

th{

background:#ff9500;

color:white;
}

#gauge{

width:280px;

height:140px;

margin:auto;

margin-top:30px;
}

</style>
</head>

<body>

<div class="box">

<h1>DKP Calculator</h1>

<p>Inserisci il tuo Player ID</p>

<input id="playerID" placeholder="Player ID">
<button onclick="cerca()">Calcola</button>

<br><br>

<a href="private-zone.html">
<button style="background:#444;">
PRIVATE ZONE
</button>
</a>

<div id="gauge"></div>

<table id="risultato" style="display:none;">
<tr>
<th>ID</th>
<th>Nome</th>
<th>Morti Totali</th>
<th>KP</th>
<th>Percentuale DKP</th>
</tr>

<tr>
<td id="rid"></td>
<td id="rnome"></td>
<td id="rmorti"></td>
<td id="rkp"></td>
<td id="rdkp"></td>
</tr>

</table>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQesM-QGA4rXJ15m67Qs-ebaGSap4BfMVvAmhN_bhkVhl8EEWuxK6QpJ91YwmhnBcxic56DnHgG5MLO/pub?gid=1336529579&single=true&output=csv";
const sheetPowerURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSJ9KTvq0UD32FiVPhO71anmWvYsUmkow7PF7N0oOw6G1IVDfI7rDGa3ChUjPKjxxVumuFqWEwRtu-t/pub?gid=1714169856&single=true&output=csv";

function parseCSV(text){
return text.trim().split("\n").map(r => r.split(","));
}

async function cerca(){

const id=document.getElementById("playerID").value.trim();

let powerMap={};

let responsePower=await fetch(sheetPowerURL);
let dataPower=await responsePower.text();
let rowsPower=parseCSV(dataPower);

for(let i=1;i<rowsPower.length;i++){

let cols=rowsPower[i];

if(!cols||cols.length<2) continue;

let idP=(cols[0]||"").trim();

let powerP=parseInt((cols[1]||"0").replace(/,/g,""));

powerMap[idP]=powerP;

}

let response=await fetch(sheetURL);

let data=await response.text();

let rows=parseCSV(data);

for(let i=1;i<rows.length;i++){

let cols=rows[i];

if(!cols||cols.length<6) continue;

let pid=(cols[0]||"").trim();

let nome=cols[1];

let power=powerMap[pid];

if(power===undefined) continue;

let mortiT5=parseInt((cols[4]||"0").replace(/,/g,""));
let mortiT4=parseInt((cols[5]||"0").replace(/,/g,""));
let kp=parseInt((cols[6]||"0").replace(/,/g,""));

if(pid!==id) continue;

let morti=mortiT5+mortiT4;

let mortiReq=0;
let kpReq=0;

if(power>=100000000){mortiReq=2000000;kpReq=400000000;}
else if(power>=90000000){mortiReq=1500000;kpReq=350000000;}
else if(power>=80000000){mortiReq=1200000;kpReq=300000000;}
else if(power>=70000000){mortiReq=1000000;kpReq=200000000;}
else if(power>=60000000){mortiReq=800000;kpReq=100000000;}
else if(power>=50000000){mortiReq=500000;kpReq=55000000;}
else{mortiReq=300000;kpReq=25000000;}

let pm=(morti/mortiReq)*100;
let pk=(kp/kpReq)*100;

let percent=(pm+pk)/2;

let color=percent<50?"red":
percent<80?"gold":
percent<100?"green":"deepskyblue";

document.getElementById("rid").innerText=pid;
document.getElementById("rnome").innerText=nome;
document.getElementById("rmorti").innerText=morti.toLocaleString();
document.getElementById("rkp").innerText=kp.toLocaleString();

let dkpCell=document.getElementById("rdkp");

dkpCell.innerText=percent.toFixed(2)+"%";

dkpCell.style.color=color;

document.getElementById("risultato").style.display="table";

disegnaGauge(percent);

return;
}

alert("Player non trovato");
}

function disegnaGauge(percent){

document.getElementById("gauge").innerHTML='<canvas id="chart"></canvas>';

let ctx=document.getElementById("chart").getContext("2d");

let color=percent<50?"red":
percent<80?"gold":
percent<100?"green":"deepskyblue";

new Chart(ctx,{
type:"doughnut",
data:{
datasets:[{
data:[percent,100-percent],
backgroundColor:[color,"#222"],
borderWidth:0
}]
},
options:{
rotation:-90,
circumference:180,
cutout:"70%",
plugins:{
legend:{display:false},
tooltip:{enabled:false}
}
}
});

}

</script>

</body>
</html>
