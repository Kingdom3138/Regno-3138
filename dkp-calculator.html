<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>DKP Calculator - Kingdom 3138</title>

<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

<style>

body{
font-family:'MedievalSharp',cursive;
background: radial-gradient(circle,#d4f1ff 0%,#89cff0 100%);
text-align:center;
padding:40px;
}

.box{
background:white;
max-width:700px;
margin:auto;
padding:30px;
border-radius:16px;
border:2px solid #cfa93e;
box-shadow:0 0 20px rgba(207,169,62,0.4);
}

h1{
color:#cfa93e;
}

input{
padding:12px;
font-size:18px;
border-radius:8px;
border:1px solid #ccc;
width:200px;
}

/* ===== NUOVO BOTTONE FIGMA ===== */
.dkp-btn{
background:none;
border:none;
cursor:pointer;
position:relative;
margin-left:10px;
transition:all 0.3s ease;
}

.dkp-btn svg{
width:200px;
}

.dkp-text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:18px;
font-weight:bold;
letter-spacing:1px;
pointer-events:none;

background:linear-gradient(90deg,#fff,#ff66ff,#fff);
background-size:200%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:shine 3s linear infinite;
}

@keyframes shine{
0%{background-position:200%;}
100%{background-position:-200%;}
}

.dkp-btn:hover{
transform:scale(1.05);
filter:drop-shadow(0 0 20px #a855f7);
}

.dkp-btn:active{
transform:scale(0.95);
filter:drop-shadow(0 0 30px #ff00ff);
}

.dkp-btn svg rect:first-child{
stroke-dashoffset:0;
transition:stroke-dashoffset 1s linear;
}

.dkp-btn:hover svg rect:first-child{
stroke-dashoffset:120;
}

table{
margin-top:30px;
width:100%;
border-collapse:collapse;
}

td,th{
border:1px solid #ddd;
padding:10px;
}

th{
background:#cfa93e;
color:white;
}

#rdkp{
font-weight:bold;
font-size:22px;
}

#gauge{
width:260px;
height:130px;
margin:auto;
margin-top:25px;
}

</style>

</head>

<body>

<div class="box">

<h1>DKP Calculator</h1>

<p>Inserisci il tuo Player ID</p>

<input id="playerID" placeholder="Player ID">

<!-- 🔥 NUOVO BOTTONE FIGMA -->
<button class="dkp-btn" onclick="cerca()">
  
  <span class="dkp-text">CALCOLA</span>

  <svg viewBox="0 0 632 310" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="0.5" y="0.5" width="631" height="309" rx="4.5"
          stroke="#8A38F5" stroke-dasharray="10 5"/>
    <rect x="86" y="20" width="461" height="125" fill="#8D0599"/>
    <rect x="86" y="165" width="461" height="125" fill="#F046FF"/>
  </svg>

</button>

<br><br>

<a href="private-zone.html">
<button style="background:#444;">
PRIVATE ZONE
</button>
</a>

<div id="gauge"></div>

<table id="risultato" style="display:none;">

<tr>
<th>ID</th>
<th>Nome</th>
<th>Morti Totali</th>
<th>KP</th>
<th>Percentuale DKP</th>
</tr>

<tr>
<td id="rid"></td>
<td id="rnome"></td>
<td id="rmorti"></td>
<td id="rkp"></td>
<td id="rdkp"></td>
</tr>

</table>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRnnFwLqL3CapW6L-QnYjRCKY7POyv-mr9Az1DWyxH1p-Yq09zJkioad9pTt5QzGaa-JZGZ2SvxSqWC/pub?gid=2073110631&single=true&output=csv";

const sheetPowerURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTQI0YbKeIe_pzwujvocelYi1tWy63MyKmieSatj2uBVORlAipQfYocqqZJLw_htYvtNbJww5PwoBfa/pub?gid=142693570&single=true&output=csv";

async function cerca(){

let id = document.getElementById("playerID").value;

/* POWER KVK */
let powerMap = {};

let responsePower = await fetch(sheetPowerURL);
let dataPower = await responsePower.text();
let rowsPower = dataPower.split("\n");

for(let i=1;i<rowsPower.length;i++){

let colsP = rowsPower[i].split(",");

let idP = colsP[0];
let powerP = parseInt(colsP[1].replace(/,/g,""));

powerMap[idP] = powerP;

}

/* FOGLIO PRINCIPALE */
let response = await fetch(sheetURL);
let data = await response.text();

let rows = data.split("\n");

for(let i=1;i<rows.length;i++){

let cols = rows[i].split(",");

let pid = cols[0];
let nome = cols[1];

let power = powerMap[pid];

if(!power) continue;

let mortiT5 = parseInt(cols[4].replace(/,/g,""));
let mortiT4 = parseInt(cols[5].replace(/,/g,""));

let morti = mortiT5 + mortiT4;

let kp = parseInt(cols[6].replace(/,/g,""));

if(pid == id){

let mortiReq=0;
let kpReq=0;

if(power >= 100000000){
mortiReq=2000000;
kpReq=400000000;
}
else if(power >= 90000000){
mortiReq=1500000;
kpReq=350000000;
}
else if(power >= 80000000){
mortiReq=1200000;
kpReq=300000000;
}
else if(power >= 70000000){
mortiReq=1000000;
kpReq=200000000;
}
else if(power >= 60000000){
mortiReq=800000;
kpReq=100000000;
}
else if(power >= 50000000){
mortiReq=500000;
kpReq=55000000;
}
else{
mortiReq=300000;
kpReq=25000000;
}

let pm = (morti / mortiReq) * 100;
let pk = (kp / kpReq) * 100;

let percent = ((pm + pk) / 2);

let percentRounded = percent.toFixed(2);

let color = "";

if(percent < 50){
color = "red";
}
else if(percent < 80){
color = "gold";
}
else if(percent < 100){
color = "green";
}
else{
color = "deepskyblue";
}

document.getElementById("rid").innerText = pid;
document.getElementById("rnome").innerText = nome;
document.getElementById("rmorti").innerText = morti.toLocaleString();
document.getElementById("rkp").innerText = kp.toLocaleString();

let dkpCell = document.getElementById("rdkp");
dkpCell.innerText = percentRounded + "%";
dkpCell.style.color = color;

document.getElementById("risultato").style.display="table";

disegnaGauge(percent);

return;

}

}

alert("Player non trovato");

}

function disegnaGauge(percent){

document.getElementById("gauge").innerHTML='<canvas id="chart"></canvas>';

let ctx=document.getElementById("chart").getContext("2d");

let color="red";

if(percent>=50) color="gold";
if(percent>=80) color="green";
if(percent>=100) color="deepskyblue";

new Chart(ctx,{
type:"doughnut",
data:{
datasets:[{
data:[percent,100-percent],
backgroundColor:[color,"#eee"],
borderWidth:0
}]
},
options:{
rotation:-90,
circumference:180,
cutout:"70%",
plugins:{
legend:{display:false},
tooltip:{enabled:false}
}
}
});

}

</script>

</body>
</html>
