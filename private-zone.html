<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Leadership Private Zone | Regno 3138</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Orbitron',sans-serif;
background:
linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.8)),
url("assets/background.jpg");

background-size:cover;
background-position:center;
background-attachment:fixed;

color:white;
padding:40px;
min-height:100vh;
}

.box{

max-width:1200px;
margin:auto;

padding:35px;

background:rgba(0,0,0,.82);

border:1px solid rgba(255,136,0,.35);

border-radius:30px;

backdrop-filter:blur(10px);

box-shadow:0 0 30px rgba(255,136,0,.25);

}

h1{

font-size:55px;

margin-bottom:35px;

background:linear-gradient(to bottom,#ffc14d,#ff8800);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:0 0 20px orange;

}

h2{
margin-bottom:20px;
}

input{

padding:15px;

width:280px;

border:none;

outline:none;

border-radius:14px;

background:#111;

color:white;

border:1px solid rgba(255,136,0,.4);

font-size:16px;

}

button{

padding:15px 30px;

border:none;

border-radius:14px;

background:#ff9500;

font-weight:700;

cursor:pointer;

color:white;

margin-left:10px;

font-family:'Orbitron';

transition:.3s;

}

button:hover{

transform:scale(1.05);

box-shadow:0 0 15px orange;

}

.stats{

display:grid;

grid-template-columns:repeat(5,1fr);

gap:15px;

margin:30px 0;

}

.stats div{

padding:15px;

border-radius:16px;

background:#111;

border:1px solid rgba(255,136,0,.25);

text-align:center;

}

#grafico{

max-width:400px;

margin:30px auto;

}

table{

width:100%;

border-collapse:collapse;

margin-top:30px;

overflow:hidden;

border-radius:15px;

}

th{

background:#ff9500;

padding:14px;

}

td{

padding:12px;

text-align:center;

background:rgba(255,255,255,.03);

border-bottom:1px solid rgba(255,255,255,.05);

}

tr:hover{

background:rgba(255,136,0,.08);

}

</style>
</head>

<body>

<div class="box">

<h1>👑 Leadership Private Zone</h1>

<div id="login">

<h2>Password Leadership</h2>

<input type="password" id="pass">

<button onclick="login()">

Accedi

</button>

</div>


<div id="panel" style="display:none;">

<h2>Statistiche Regno</h2>

<div class="stats">

<div id="totPlayers"></div>
<div id="avgDKP"></div>
<div id="above100"></div>
<div id="below50"></div>
<div id="deathHeavyCount"></div>

</div>

<canvas id="grafico"></canvas>

<table id="ranking">

<tr>

<th>Rank</th>
<th>ID</th>
<th>Nome</th>
<th>Potere</th>
<th>Morti</th>
<th>KP</th>
<th>DKP %</th>
<th>% Morti</th>
<th>% KP</th>

</tr>

</table>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const PASSWORD="3138leaders";

const sheetURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQesM-QGA4rXJ15m67Qs-ebaGSap4BfMVvAmhN_bhkVhl8EEWuxK6QpJ91YwmhnBcxic56DnHgG5MLO/pub?gid=1336529579&single=true&output=csv";

const sheetPowerURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSJ9KTvq0UD32FiVPhO71anmWvYsUmkow7PF7N0oOw6G1IVDfI7rDGa3ChUjPKjxxVumuFqWEwRtu-t/pub?gid=1714169856&single=true&output=csv";


function login(){

let p=document.getElementById("pass").value;

if(p===PASSWORD){

document.getElementById("login").style.display="none";

document.getElementById("panel").style.display="block";

carica();

}else{

alert("Password errata");

}

}



async function carica(){

try{

let powerMap={};

let responsePower=await fetch(sheetPowerURL);

let dataPower=await responsePower.text();

let rowsPower=dataPower.trim().split(/\r?\n/);

for(let i=1;i<rowsPower.length;i++){

let cols=rowsPower[i].split(",");

let id=(cols[0]||"").trim();

let power=parseInt(

(cols[2]||"0")

.replace(/,/g,"")

)||0;

powerMap[id]=power;

}


let response=await fetch(sheetURL);

let data=await response.text();

let rows=data.trim().split(/\r?\n/);

let players=[];


for(let i=1;i<rows.length;i++){

let cols=rows[i].split(",");

if(cols.length<7) continue;

let id=(cols[0]||"").trim();

let nome=(cols[1]||"N/A");

let power=powerMap[id]||0;

let morti=

parseInt((cols[4]||0).replace(/,/g,""))+

parseInt((cols[5]||0).replace(/,/g,""));

let kp=

parseInt((cols[6]||0).replace(/,/g,""));

let mortiReq=0;
let kpReq=0;

if(power>=100000000){
mortiReq=2000000;
kpReq=400000000;
}
else if(power>=90000000){
mortiReq=1500000;
kpReq=350000000;
}
else if(power>=80000000){
mortiReq=1200000;
kpReq=300000000;
}
else if(power>=70000000){
mortiReq=1000000;
kpReq=200000000;
}
else if(power>=60000000){
mortiReq=800000;
kpReq=100000000;
}
else if(power>=50000000){
mortiReq=500000;
kpReq=55000000;
}
else{
mortiReq=300000;
kpReq=25000000;
}

let pm=(morti/mortiReq)*100;

let pk=(kp/kpReq)*100;

let dkp=(pm+pk)/2;

players.push({
id,nome,power,morti,kp,pm,pk,dkp
});

}


players.sort((a,b)=>b.dkp-a.dkp);

let total=0;
let sopra100=0;
let sotto50=0;
let deathHeavy=0;

let fasce=[0,0,0,0];

let table=document.getElementById("ranking");

table.innerHTML=`
<tr>
<th>Rank</th>
<th>ID</th>
<th>Nome</th>
<th>Potere</th>
<th>Morti</th>
<th>KP</th>
<th>DKP %</th>
<th>% Morti</th>
<th>% KP</th>
</tr>
`;

players.forEach((p,i)=>{

total+=p.dkp;

if(p.dkp>=100) sopra100++;
if(p.dkp<50) sotto50++;

if(p.pm>p.pk+1)
deathHeavy++;

if(p.dkp<50) fasce[0]++;
else if(p.dkp<80) fasce[1]++;
else if(p.dkp<100) fasce[2]++;
else fasce[3]++;

let row=table.insertRow();

row.insertCell(0).innerText=i+1;
row.insertCell(1).innerText=p.id;
row.insertCell(2).innerText=p.nome;
row.insertCell(3).innerText=p.power.toLocaleString();
row.insertCell(4).innerText=p.morti.toLocaleString();
row.insertCell(5).innerText=p.kp.toLocaleString();

let d=row.insertCell(6);

d.innerText=p.dkp.toFixed(1)+"%";

d.style.color=
p.dkp<50?"red":
p.dkp<80?"gold":
p.dkp<100?"lime":
"deepskyblue";

row.insertCell(7).innerText=p.pm.toFixed(1)+"%";
row.insertCell(8).innerText=p.pk.toFixed(1)+"%";

});


let avg=players.length?total/players.length:0;

totPlayers.innerText="Fighters: "+players.length;
avgDKP.innerText="DKP Medio: "+avg.toFixed(1)+"%";
above100.innerText="Sopra 100%: "+sopra100;
below50.innerText="Sotto 50%: "+sotto50;
deathHeavyCount.innerText="Death Heavy: "+deathHeavy;


new Chart(grafico,{

type:"doughnut",

data:{

labels:["<50","50-79","80-99","100+"],

datasets:[{

data:fasce

}]

},

options:{

plugins:{

legend:{
labels:{
color:"white"
}
}

}

}

});

}catch(e){

console.log(e);

alert("Errore caricamento dati");

}

}

</script>

</body>
</html>
