<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Leadership Panel - Kingdom 3138</title>

<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

<style>
body{
font-family:'MedievalSharp',cursive;
background: radial-gradient(circle,#d4f1ff 0%,#89cff0 100%);
text-align:center;
padding:40px;
}

.box{
background:white;
max-width:1100px;
margin:auto;
padding:30px;
border-radius:16px;
border:2px solid #cfa93e;
box-shadow:0 0 20px rgba(207,169,62,0.4);
}

h1{color:#cfa93e;}

input,button{
padding:10px;
font-size:18px;
border-radius:8px;
border:1px solid #ccc;
}

button{
border:none;
background:#cfa93e;
color:white;
cursor:pointer;
}

table{
margin-top:30px;
width:100%;
border-collapse:collapse;
}

td,th{
border:1px solid #ddd;
padding:10px;
}

th{
background:#cfa93e;
color:white;
}

#grafico{
max-width:400px;
margin:30px auto;
}
</style>
</head>

<body>

<div class="box">

<h1>👑 Leadership Private Zone</h1>

<div id="login">
<p>Inserisci la password leadership</p>
<input type="password" id="pass">
<button onclick="login()">Accedi</button>
</div>

<div id="panel" style="display:none;">

<h2>Statistiche Regno</h2>

<div class="stats">
<div id="totPlayers"></div>
<div id="avgDKP"></div>
<div id="above100"></div>
<div id="below50"></div>
<div id="deathHeavyCount"></div>
</div>

<canvas id="grafico"></canvas>

<table id="ranking">
<tr>
<th>Rank</th>
<th>ID</th>
<th>Nome</th>
<th>Potere</th>
<th>Morti</th>
<th>KP</th>
<th>DKP %</th>
<th>% Morti</th>
<th>% KP</th>
</tr>
</table>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const PASSWORD = "3138leaders";

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQesM-QGA4rXJ15m67Qs-ebaGSap4BfMVvAmhN_bhkVhl8EEWuxK6QpJ91YwmhnBcxic56DnHgG5MLO/pub?gid=1336529579&single=true&output=csv";

const sheetPowerURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSJ9KTvq0UD32FiVPhO71anmWvYsUmkow7PF7N0oOw6G1IVDfI7rDGa3ChUjPKjxxVumuFqWEwRtu-t/pub?gid=1714169856&single=true&output=csv";

function clean(v){
return (v || "")
.toString()
.replace(/"/g,"")
.replace(/\r/g,"")
.trim();
}

function safeInt(v){
return parseInt(
(v || "")
.toString()
.replace(/"/g,"")
.replace(/,/g,"")
.replace(/\r/g,"")
.trim()
) || 0;
}

function login(){

let p = document.getElementById("pass").value;

if(p === PASSWORD){
document.getElementById("login").style.display="none";
document.getElementById("panel").style.display="block";
carica();
}else{
alert("Password errata");
}

}

async function carica(){

let powerMap = {};

/* POWER SHEET */
let responsePower = await fetch(sheetPowerURL);
let dataPower = await responsePower.text();
let rowsPower = dataPower.trim().split(/\r?\n/);

for(let i=1;i<rowsPower.length;i++){

let cols = rowsPower[i].split(",");

let id = clean(cols[0]);

/* POWER = COLONNA 2 */
let power = safeInt(cols[2]);

powerMap[id] = power;

}

/* MAIN SHEET */
let response = await fetch(sheetURL);
let data = await response.text();
let rows = data.trim().split(/\r?\n/);

let players = [];

for(let i=1;i<rows.length;i++){

let cols = rows[i].split(",");

let id = clean(cols[0]);
let nome = clean(cols[1]) || "N/A";

let power = powerMap[id];

if(power === undefined) power = 0;

/* MORTI */
let morti = safeInt(cols[4]) + safeInt(cols[5]);

/* KP */
let kp = safeInt(cols[6]);

let mortiReq=0, kpReq=0;

if(power >= 100000000){
mortiReq=2000000;
kpReq=400000000;
}
else if(power >= 90000000){
mortiReq=1500000;
kpReq=350000000;
}
else if(power >= 80000000){
mortiReq=1200000;
kpReq=300000000;
}
else if(power >= 70000000){
mortiReq=1000000;
kpReq=200000000;
}
else if(power >= 60000000){
mortiReq=800000;
kpReq=100000000;
}
else if(power >= 50000000){
mortiReq=500000;
kpReq=55000000;
}
else{
mortiReq=300000;
kpReq=25000000;
}

/* FORMULA DKP */
let pm = (morti / mortiReq) * 100;
let pk = (kp / kpReq) * 100;
let dkp = (pm + pk) / 2;

players.push({
id,
nome,
power,
morti,
kp,
dkp,
pm,
pk
});

}

players.sort((a,b)=>b.dkp-a.dkp);

/* TABLE */
let table = document.getElementById("ranking");

table.innerHTML = `
<tr>
<th>Rank</th>
<th>ID</th>
<th>Nome</th>
<th>Potere</th>
<th>Morti</th>
<th>KP</th>
<th>DKP %</th>
<th>% Morti</th>
<th>% KP</th>
</tr>
`;

let totalDKP=0;
let above100=0;
let below50=0;
let deathHeavy=0;

let fasce=[0,0,0,0];

players.forEach((p,i)=>{

totalDKP += p.dkp;

if(p.dkp>=100) above100++;
if(p.dkp<50) below50++;

if(p.pm > p.pk + 1) deathHeavy++;

if(p.dkp<50) fasce[0]++;
else if(p.dkp<80) fasce[1]++;
else if(p.dkp<100) fasce[2]++;
else fasce[3]++;

let color =
p.dkp<50 ? "red" :
p.dkp<80 ? "gold" :
p.dkp<100 ? "green" :
"deepskyblue";

let row = table.insertRow();

row.insertCell(0).innerText = i+1;
row.insertCell(1).innerText = p.id;
row.insertCell(2).innerText = p.nome;
row.insertCell(3).innerText = p.power.toLocaleString();
row.insertCell(4).innerText = p.morti.toLocaleString();
row.insertCell(5).innerText = p.kp.toLocaleString();

let c6 = row.insertCell(6);
c6.innerText = p.dkp.toFixed(2)+"%";
c6.style.color = color;

row.insertCell(7).innerText = p.pm.toFixed(1)+"%";
row.insertCell(8).innerText = p.pk.toFixed(1)+"%";

});

let avg = players.length ? totalDKP / players.length : 0;

document.getElementById("totPlayers").innerText =
"Totale Fighters: "+players.length;

document.getElementById("avgDKP").innerText =
"DKP Medio: "+avg.toFixed(2)+"%";

document.getElementById("above100").innerText =
"Player sopra 100%: "+above100;

document.getElementById("below50").innerText =
"Player sotto 50%: "+below50;

document.getElementById("deathHeavyCount").innerText =
"Death Heavy: "+deathHeavy;

/* CHART */
new Chart(document.getElementById("grafico"),{
type:"doughnut",
data:{
labels:["<50%","50-79%","80-99%","100%+"],
datasets:[{
data:fasce,
backgroundColor:["red","gold","green","deepskyblue"]
}]
},
options:{
cutout:"60%",
plugins:{
legend:{
position:"bottom"
}
}
}
});

}

</script>

</body>
</html>
