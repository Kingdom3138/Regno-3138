<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Leadership Panel - Kingdom 3138</title>

<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

<style>
body{
font-family:'MedievalSharp',cursive;
background: radial-gradient(circle,#d4f1ff 0%,#89cff0 100%);
text-align:center;
padding:40px;
animation: fadeIn 1s ease;
}

@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

.box{
background:white;
max-width:1100px;
margin:auto;
padding:30px;
border-radius:16px;
border:2px solid #cfa93e;
box-shadow:0 0 20px rgba(207,169,62,0.4);
}

h1{color:#cfa93e;}

input,button{
padding:10px;
font-size:18px;
border-radius:8px;
border:1px solid #ccc;
}

button{
border:none;
background:#cfa93e;
color:white;
cursor:pointer;
}

table{
margin-top:30px;
width:100%;
border-collapse:collapse;
}

td,th{
border:1px solid #ddd;
padding:10px;
}

th{
background:#cfa93e;
color:white;
}

.stats{
margin-top:20px;
font-size:18px;
}

#grafico{
max-width:400px;
margin:30px auto;
}
</style>
</head>

<body>

<div class="box">

<h1>👑 Leadership Private Zone</h1>

<div id="login">
<p>Inserisci la password leadership</p>
<input type="password" id="pass">
<button onclick="login()">Accedi</button>
</div>

<div id="panel" style="display:none;">

<h2>Statistiche Regno</h2>

<div class="stats">
<div id="totPlayers"></div>
<div id="avgDKP"></div>
<div id="above100"></div>
<div id="below50"></div>
<div id="deathHeavyCount"></div>
</div>

<canvas id="grafico"></canvas>

<table id="ranking">
<tr>
<th>Rank</th>
<th>ID</th>
<th>Nome</th>
<th>Potere</th>
<th>Morti</th>
<th>KP</th>
<th>DKP %</th>
<th>% Morti</th>
<th>% KP</th>
</tr>
</table>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const PASSWORD = "3138leaders";

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQTo_eJ3z4xPtR50thD4Uxwtk2QMkzsR68BsbP0KQXg11D7RCaWfdNeWiu_0iVlEj4FXBq0JYkXTOk2/pub?gid=1766737411&single=true&output=csv";

const sheetPowerURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQDR4iR8klxkCMwz6JCWaumuBHQH85TJmBGUUHw520KYwJ5cKjFvt2g3BZGPOLBS1EllZtXStAbv618/pub?gid=1432291627&single=true&output=csv";

function parseCSV(text){
return text.trim().split("\n").map(r => r.split(","));
}

function safeInt(v){
return parseInt((v || "0").replace(/,/g,"")) || 0;
}

function login(){
let p = document.getElementById("pass").value;

if(p === PASSWORD){
document.getElementById("login").style.display="none";
document.getElementById("panel").style.display="block";
carica();
}else{
alert("Password errata");
}
}

async function carica(){

let powerMap = {};

let responsePower = await fetch(sheetPowerURL);
let rowsPower = parseCSV(await responsePower.text());

for(let i=1;i<rowsPower.length;i++){
let cols = rowsPower[i];
if(!cols || cols.length < 2) continue;

let id = (cols[0] || "").trim();
let power = safeInt(cols[1]);

if(id) powerMap[id] = power;
}

let response = await fetch(sheetURL);
let rows = parseCSV(await response.text());

let players = [];

for(let i=1;i<rows.length;i++){

let cols = rows[i];
if(!cols || cols.length < 6) continue;

let id = (cols[0] || "").trim();
let nome = cols[1] || "";

let power = powerMap[id];
if(power === undefined) power = 0;

if(power && power < 50000000) continue;

let morti = safeInt(cols[4]) + safeInt(cols[5]);
let kp = safeInt(cols[6]);

let mortiReq=0, kpReq=0;

if(power >= 100000000){mortiReq=2000000; kpReq=400000000;}
else if(power >= 90000000){mortiReq=1500000; kpReq=350000000;}
else if(power >= 80000000){mortiReq=1200000; kpReq=300000000;}
else if(power >= 70000000){mortiReq=1000000; kpReq=200000000;}
else if(power >= 60000000){mortiReq=800000; kpReq=100000000;}
else if(power >= 50000000){mortiReq=500000; kpReq=55000000;}

let pm = mortiReq ? (morti / mortiReq) * 100 : 0;
let pk = kpReq ? (kp / kpReq) * 100 : 0;

let dkp = (pm + pk) / 2;

players.push({id,nome,power,morti,kp,dkp,pm,pk});
}

players.sort((a,b)=>b.dkp-a.dkp);

let table = document.getElementById("ranking");

table.innerHTML = `
<tr>
<th>Rank</th>
<th>ID</th>
<th>Nome</th>
<th>Potere</th>
<th>Morti</th>
<th>KP</th>
<th>DKP %</th>
<th>% Morti</th>
<th>% KP</th>
</tr>
`;

let totalDKP=0, above100=0, below50=0, deathHeavy=0;
let fasce=[0,0,0,0];

players.forEach((p,i)=>{

totalDKP += p.dkp;

if(p.dkp>=100) above100++;
if(p.dkp<50) below50++;
if(p.pm > p.pk+1) deathHeavy++;

if(p.dkp<50) fasce[0]++;
else if(p.dkp<80) fasce[1]++;
else if(p.dkp<100) fasce[2]++;
else fasce[3]++;

let color = p.dkp<50?"red":p.dkp<80?"gold":p.dkp<100?"green":"deepskyblue";

let row = table.insertRow();

row.insertCell(0).innerText = i+1;
row.insertCell(1).innerText = p.id;
row.insertCell(2).innerText = p.nome;
row.insertCell(3).innerText = p.power.toLocaleString();
row.insertCell(4).innerText = p.morti.toLocaleString();
row.insertCell(5).innerText = p.kp.toLocaleString();

let c6 = row.insertCell(6);
c6.innerText = p.dkp.toFixed(2)+"%";
c6.style.color = color;

row.insertCell(7).innerText = p.pm.toFixed(1)+"%";
row.insertCell(8).innerText = p.pk.toFixed(1)+"%";

});

let avg = players.length ? totalDKP / players.length : 0;

document.getElementById("totPlayers").innerText = "Totale Fighters: "+players.length;
document.getElementById("avgDKP").innerText = "DKP Medio: "+avg.toFixed(2)+"%";
document.getElementById("above100").innerText = "Player sopra 100%: "+above100;
document.getElementById("below50").innerText = "Player sotto 50%: "+below50;
document.getElementById("deathHeavyCount").innerText = "Death Heavy: "+deathHeavy;

if(players.length > 0){
new Chart(document.getElementById("grafico"),{
type:"doughnut",
data:{
labels:["<50%","50-79%","80-99%","100%+"],
datasets:[{
data:fasce,
backgroundColor:["red","gold","green","deepskyblue"]
}]
},
options:{
cutout:"60%",
plugins:{legend:{position:"bottom"}}
}
});
}

}

</script>

</body>
</html>
